name: Zedin Browser APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Java Kur
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git zip unzip \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
          libsdl2-ttf-dev libportmidi-dev zlib1g-dev \
          autoconf libtool pkg-config
        pip install python-for-android cython

    - name: Lisansları Kabul Et
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;34.0.0" \
          "platforms;android-33" \
          "platform-tools" || true
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license

    - name: APK Derle
      run: |
        p4a apk \
          --private . \
          --package com.rrbluecat.zedinbrowser \
          --name "Zedin Browser" \
          --version 0.1 \
          --bootstrap sdl2 \
          --requirements python3,kivy \
          --arch arm64-v8a \
          --sdk-dir $ANDROID_SDK_ROOT \
          --ndk-dir $ANDROID_NDK_HOME

    - name: APK Yükle
      uses: actions/upload-artifact@v4
      with:
        name: zedin-browser
        path: "*.apk"
