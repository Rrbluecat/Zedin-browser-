name: Zedin Browser APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git zip unzip \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
          libsdl2-ttf-dev libportmidi-dev zlib1g-dev
        pip install buildozer cython

    - name: SDK Yapısını Hazırla
      run: |
        SDKPATH="$HOME/.buildozer/android/platform/android-sdk"
        REALSDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
        
        # Buildozer'ın beklediği eski yolu oluştur
        mkdir -p $SDKPATH/tools/bin
        mkdir -p $SDKPATH/licenses
        
        # Wrapper oluştur - eski yola çağrı gelince yeni sdkmanager'a yönlendir
        cat > $SDKPATH/tools/bin/sdkmanager << 'EOF'
#!/bin/bash
exec /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "$@"
EOF
        chmod +x $SDKPATH/tools/bin/sdkmanager
        
        # Lisansları oluştur
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDKPATH/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $SDKPATH/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDKPATH/licenses/android-sdk-preview-license
        
        # platform-tools ve build-tools linkle
        ln -sfn /usr/local/lib/android/sdk/platform-tools $SDKPATH/platform-tools
        ln -sfn /usr/local/lib/android/sdk/build-tools $SDKPATH/build-tools
        ln -sfn /usr/local/lib/android/sdk/platforms $SDKPATH/platforms

    - name: APK Derle
      run: |
        buildozer android debug

    - name: APK Yükle
      uses: actions/upload-artifact@v4
      with:
        name: zedin-browser
        path: bin/*.apk
