on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Java Kur
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git \
          ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev zlib1g-dev
        pip install buildozer cython

    - name: Android SDK Lisanslarını Kabul Et
      run: |
        mkdir -p $HOME/.android
        echo "count=0" > $HOME/.android/repositories.cfg
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          --licenses || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "build-tools;34.0.0" \
          "platforms;android-33" || true

    - name: APK Derle
      run: |
        buildozer android debug

    - name: APK'yı Yükle
      uses: actions/upload-artifact@v4
      with:
        name: zedin-browser
        path: bin/*.apk
