name: Zedin Browser APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: APK Derle
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          kivy/buildozer:latest \
          android debug

    - name: APK Yükle
      uses: actions/upload-artifact@v4
      with:
        name: zedin-browser
        path: bin/*.apk
